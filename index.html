<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordWheel</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WordWheel" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <h1 class="logo">Word<span>Wheel</span></h1>
      <div class="header-stats">
        <!-- Circular round-progress ring -->
        <div class="round-ring" aria-label="Round progress">
          <svg class="ring-svg" viewBox="0 0 40 40" aria-hidden="true">
            <circle class="ring-track" cx="20" cy="20" r="15"/>
            <circle class="ring-fill"  cx="20" cy="20" r="15" id="ring-fill"/>
          </svg>
          <div class="ring-label">
            <span id="round-current" class="ring-current">1</span>
            <span class="ring-sep">/</span>
            <span id="round-total"   class="ring-total">20</span>
          </div>
        </div>
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
      </div>
    </header>

    <!-- ── Progress bar ── -->
    <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="20" aria-valuenow="0">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- ── Main game area ── -->
    <main class="game">

      <!-- Category chip -->
      <div class="category" id="category">Loading…</div>

      <!-- Word slots + feedback -->
      <div class="word-area">
        <div class="slots" id="slots"></div>
        <div class="feedback" id="feedback" aria-live="polite"></div>
      </div>

      <!-- The Wheel -->
      <div class="wheel-wrap">
        <div class="wheel" id="wheel" aria-label="Letter wheel"></div>
      </div>

      <!-- Controls -->
      <div class="btn-row">
        <button class="btn ghost"   id="btn-clear">⌫&nbsp; Back</button>
        <button class="btn submit"  id="btn-submit" disabled>Submit ↵</button>
        <button class="btn ghost"   id="btn-hint">💡&nbsp; Hint</button>
      </div>
      <div class="btn-row">
        <button class="btn primary hidden" id="btn-next">Next Puzzle →</button>
      </div>

    </main>

    <!-- ── Game-complete screen ── -->
    <div class="complete-screen hidden" id="complete-screen" role="dialog" aria-modal="true" aria-label="Game complete">
      <div class="complete-card">
        <div class="complete-emoji" id="complete-emoji">🏆</div>
        <h2 id="complete-heading">You finished!</h2>
        <p>Final Score</p>
        <div class="final-score" id="final-score">0 / 20</div>
        <p class="complete-msg" id="complete-msg"></p>
        <button class="btn primary" id="btn-restart">Play Again</button>
      </div>
    </div>

  </div><!-- #app -->

  <script src="words.js"></script>
  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
