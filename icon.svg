<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#08081a"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#7c3aed" stroke-width="8" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#a78bfa" stroke-width="4" opacity="0.25" stroke-dasharray="12 8"/>
  <!-- 6 letter tiles around the wheel -->
  <!-- Top -->
  <circle cx="256" cy="80"  r="44" fill="#2d2680" stroke="#a78bfa" stroke-width="4"/>
  <text x="256" y="96"  text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="36" fill="#ede9fe">W</text>
  <!-- Top-right -->
  <circle cx="403" cy="168" r="44" fill="#2d2680" stroke="#a78bfa" stroke-width="4"/>
  <text x="403" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="36" fill="#ede9fe">O</text>
  <!-- Bottom-right -->
  <circle cx="403" cy="344" r="44" fill="#2d2680" stroke="#a78bfa" stroke-width="4"/>
  <text x="403" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="36" fill="#ede9fe">R</text>
  <!-- Bottom -->
  <circle cx="256" cy="432" r="44" fill="#2d2680" stroke="#a78bfa" stroke-width="4"/>
  <text x="256" y="448" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="36" fill="#ede9fe">D</text>
  <!-- Bottom-left -->
  <circle cx="109" cy="344" r="44" fill="#fbbf24" stroke="#fcd34d" stroke-width="4"/>
  <text x="109" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="36" fill="#1c1000">S</text>
  <!-- Top-left -->
  <circle cx="109" cy="168" r="44" fill="#2d2680" stroke="#a78bfa" stroke-width="4"/>
  <text x="109" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="36" fill="#ede9fe">!</text>
</svg>
